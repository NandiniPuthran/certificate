---
# Production Inventory
# Certificate lifecycle management - non-FreeIPA client hosts

all:
  vars:
    ansible_user: ansible
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3

  children:
    # ─── IPA Infrastructure ───────────────────────────────────────────────────
    ipa_clients:
      hosts:
        ipa-client01.company.example:
          ansible_host: 192.168.10.50
      vars:
        ipa_server: ipa01.company.example
        ipa_realm: COMPANY.EXAMPLE
        ipa_domain: company.example
        # CRL distribution point - this host serves CRL via Apache
        crl_host: true
        crl_fqdn: crl.company.example

    # ─── Stations ─────────────────────────────────────────────────────────────
    station01:
      hosts:
        device01.station01.company.example:
          ansible_host: 192.168.20.11
          cert_cn: device01.station01.company.example
          cert_san_dns:
            - device01.station01.company.example
            - device01
          cert_profile: caIPAserviceCert
          station: station01
          device_id: device01
        device02.station01.company.example:
          ansible_host: 192.168.20.12
          cert_cn: device02.station01.company.example
          cert_san_dns:
            - device02.station01.company.example
            - device02
          cert_profile: caIPAserviceCert
          station: station01
          device_id: device02
        device03.station01.company.example:
          ansible_host: 192.168.20.13
          cert_cn: device03.station01.company.example
          cert_san_dns:
            - device03.station01.company.example
            - device03
          cert_profile: caIPAserviceCert
          station: station01
          device_id: device03
      vars:
        station_id: station01
        cert_key_size: 4096
        cert_key_type: RSA
        cert_validity_days: 365

    station02:
      hosts:
        device01.station02.company.example:
          ansible_host: 192.168.20.21
          cert_cn: device01.station02.company.example
          cert_san_dns:
            - device01.station02.company.example
          cert_profile: caIPAserviceCert
          station: station02
          device_id: device01
        device02.station02.company.example:
          ansible_host: 192.168.20.22
          cert_cn: device02.station02.company.example
          cert_san_dns:
            - device02.station02.company.example
          cert_profile: caIPAserviceCert
          station: station02
          device_id: device02
      vars:
        station_id: station02
        cert_key_size: 4096
        cert_key_type: RSA
        cert_validity_days: 365

    # ─── All certificate target hosts ─────────────────────────────────────────
    cert_targets:
      children:
        station01: {}
        station02: {}
      vars:
        # Where certs land on target hosts
        cert_base_dir: /etc/ssl/company
        cert_dir: /etc/ssl/company/certs
        cert_key_dir: /etc/ssl/company/private
        cert_csr_dir: /etc/ssl/company/csr
        # IPA signing delegation host
        ipa_signing_host: ipa-client01.company.example
        # CRL / OCSP endpoints embedded in certs
        crl_distribution_uri: "http://crl.company.example/crl.pem"
        ocsp_uri: "http://ocsp.company.example"
        # CA bundle path on targets
        ca_bundle_path: /etc/ssl/company/ca/ipa-ca.crt
        # Applications that need reloading after cert changes
        cert_consumers:
          - docker
          - fluent_bit
