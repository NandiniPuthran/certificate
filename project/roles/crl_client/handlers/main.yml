  min_ansible_version: "2.9"
  platforms:
    - name: EL
      versions: [7, 8, 9]
    - name: Ubuntu
      versions: [18.04, 20.04, 22.04]
  galaxy_tags:
    - crl
    - pki

dependencies: []

tags:
  - crl_client
  - distribution
