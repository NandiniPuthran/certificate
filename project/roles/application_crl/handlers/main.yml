    state: restarted
  become: true
  listen: "restart rsyslog"
  tags:
    - application_crl
    - handlers

- name: "restart etcd"
  ansible.builtin.systemd:
    name: etcd
    state: restarted
  become: true
  listen: "restart etcd"
  tags:
    - application_crl
    - handlers

- name: "restart freeradius"
  ansible.builtin.systemd:
    name: radiusd
    state: restarted
  become: true
  listen: "restart freeradius"
  tags:
    - application_crl
    - handlers
