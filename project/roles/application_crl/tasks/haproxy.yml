---
# roles/application_crl/tasks/freeradius.yml
# Configure FreeRADIUS for EAP-TLS with CRL

---

- name: "Configure FreeRADIUS CRL"
  block:
    - name: "Create FreeRADIUS CRL config"
      ansible.builtin.copy:
        content: |
          # FreeRADIUS EAP-TLS with CRL
          eap {
            default_eap_type = tls
            tls {
              certfile = /etc/raddb/certs/server.pem
              keyfile = /etc/raddb/certs/server.key
              cafile = /etc/pki/tls/certs/ca-bundle.crt
              crlfile = {{ freeradius_crl_file }}
            }
          }
        dest: "{{ freeradius_config_dir }}/mods-enabled/eap-tls-crl.conf"
        owner: root
        group: radiusd
        mode: '0640'
      become: true
      notify: "restart freeradius"
      tags:
        - application_crl
        - freeradius

    - name: "Log FreeRADIUS CRL configuration"
      ansible.builtin.lineinfile:
        path: "{{ application_crl_log_file }}"
        line: "[{{ ansible_date_time.iso8601 }}] FreeRADIUS EAP-TLS CRL configured: {{ freeradius_crl_file }} (soft-fail)"
        create: true
      become: true
      tags:
        - application_crl
        - freeradius

  tags:
    - application_crl
    - freeradius
